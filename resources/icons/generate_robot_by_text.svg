<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background - no background element -->
  
  <!-- Robot body - solid part (left and bottom) -->
  <!-- Main body -->
  <rect x="8" y="28" width="28" height="24" rx="4" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1.5"/>
  
  <!-- Head - solid left part (centered at x=32) -->
  <rect x="14" y="6" width="18" height="18" rx="3" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <circle cx="20" cy="15" r="2.5" fill="#66bb6a"/>
  <circle cx="28" cy="15" r="2.5" fill="#66bb6a"/>
  
  <!-- Left arm -->
  <rect x="2" y="32" width="8" height="14" rx="3" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1"/>
  
  <!-- Left leg -->
  <rect x="12" y="52" width="8" height="10" rx="2" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1"/>
  <rect x="24" y="52" width="8" height="10" rx="2" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1"/>
  
  <!-- Right arm - trail of smaller copies along flight path from top-right -->
