  <rect x="36" y="32" width="8" height="14" rx="3" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1" opacity="0.9"/>
  
  <!-- Trail of smaller right arms along flight path -->
  <!-- Scale 0.85 -->
  <g transform="translate(42, 28) scale(0.85)" opacity="0.7">
    <rect x="0" y="0" width="8" height="14" rx="3" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1"/>
  </g>
  <!-- Scale 0.7 -->
  <g transform="translate(47, 23) scale(0.7)" opacity="0.55">
    <rect x="0" y="0" width="8" height="14" rx="3" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1"/>
  </g>
  <!-- Scale 0.55 -->
  <g transform="translate(51, 18) scale(0.55)" opacity="0.4">
    <rect x="0" y="0" width="8" height="14" rx="3" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1"/>
  </g>
  <!-- Scale 0.4 -->
  <g transform="translate(55, 13) scale(0.4)" opacity="0.3">
    <rect x="0" y="0" width="8" height="14" rx="3" fill="rgb(216, 216, 216)" stroke="rgb(0, 0, 0)" stroke-width="1"/>
