<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- IK Solver icon: stylised robot arm reaching toward a target crosshair -->
  <!-- Transparent background -->

  <!-- ── Base / shoulder joint ── -->
  <rect x="24" y="52" width="16" height="6" rx="2"
        fill="#4a90d9" opacity="0.95"/>

  <!-- Base circle (shoulder) -->
  <circle cx="32" cy="50" r="5"
          fill="#4a90d9" stroke="#2260a8" stroke-width="1.2"/>

  <!-- ── Upper arm ── -->
  <!-- Link 1: angled up-right from shoulder -->
  <line x1="32" y1="50" x2="22" y2="30"
        stroke="#4a90d9" stroke-width="5" stroke-linecap="round"/>

  <!-- Elbow joint -->
  <circle cx="22" cy="30" r="4.5"
          fill="#4a90d9" stroke="#2260a8" stroke-width="1.2"/>

  <!-- ── Forearm ── -->
  <!-- Link 2: angled up-right from elbow -->
  <line x1="22" y1="30" x2="42" y2="18"
        stroke="#5ba3e8" stroke-width="4" stroke-linecap="round"/>

  <!-- Wrist joint -->
  <circle cx="42" cy="18" r="3.8"
          fill="#5ba3e8" stroke="#2260a8" stroke-width="1.2"/>

  <!-- ── End-effector / hand ── -->
  <line x1="42" y1="18" x2="50" y2="11"
        stroke="#7dbfff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="11" r="2.8"
          fill="#7dbfff" stroke="#2260a8" stroke-width="1"/>

  <!-- ── Target crosshair (top-right area) ── -->
  <!-- Outer ring -->
  <circle cx="50" cy="11" r="8"
          fill="none" stroke="#e05252" stroke-width="1.5" opacity="0.85"/>
  <!-- Cross lines -->
  <line x1="50" y1="4"  x2="50" y2="8"
        stroke="#e05252" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <line x1="50" y1="14" x2="50" y2="18"
        stroke="#e05252" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <line x1="43" y1="11" x2="47" y2="11"
        stroke="#e05252" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <line x1="53" y1="11" x2="57" y2="11"
        stroke="#e05252" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Small "IK" text label ── -->
  <text x="0" y="62" font-family="monospace,sans-serif" font-size="18"
        font-weight="bold" fill="#4a90d9" opacity="0.9">IK</text>
</svg>
